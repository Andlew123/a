<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro - Airsoft Negreira</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#1a1a1a;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.box{
    background:#0b0b0b;
    padding:30px;
    border:2px solid #4a5d4e;
    border-radius:10px;
    width:100%;
    max-width:450px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    background:#2b2b2b;
    color:white;
    border:1px solid #444;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#4a5d4e;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#estado{
    margin-top:15px;
    text-align:center;
}

.links{
    margin-top:20px;
    text-align:center;
}

.links a{
    color:#8dc891;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="box">

<h2>Crear Cuenta</h2>

<input
id="usuario"
type="text"
placeholder="Usuario">

<input
id="password"
type="password"
placeholder="Contraseña">

<input
id="password2"
type="password"
placeholder="Repetir contraseña">

<button
id="btnRegistro"
onclick="registrar()">
Crear cuenta
</button>

<p id="estado"></p>

<div class="links">
<a href="login.html">
Ya tengo cuenta
</a>
</div>

</div>

<script>

async function registrar(){

    const usuario =
    document.getElementById("usuario")
    .value
    .trim()
    .toLowerCase();

    const password =
    document.getElementById("password")
    .value;

    const password2 =
    document.getElementById("password2")
    .value;

    const estado =
    document.getElementById("estado");

    estado.innerText = "";

    if(!usuario || !password){

        estado.innerText =
        "Completa todos los campos";

        return;
    }

    if(password !== password2){

        estado.innerText =
        "Las contraseñas no coinciden";

        return;
    }

    if(password.length < 6){

        estado.innerText =
        "Mínimo 6 caracteres";

        return;
    }

    document.getElementById("btnRegistro")
    .disabled = true;

    const email =
    usuario + "@airsoft.local";

    const {
        error
    } = await supabaseClient.auth.signUp({

        email: email,
        password: password

    });

    if(error){

        estado.innerText =
        error.message;

        document.getElementById("btnRegistro")
        .disabled = false;

        return;
    }

    estado.innerText =
    "Cuenta creada correctamente";

    setTimeout(()=>{

        window.location.href =
        "login.html";

    },1500);

}

</script>

</body>
</html>
